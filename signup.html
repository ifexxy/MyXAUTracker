<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#070c12" />
  <title>Create Account · XAU Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    html, body {
      min-height: 100%;
      background: var(--bg-deep);
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Top bar ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .topbar-brand { display: flex; align-items: center; gap: 8px; }
    .topbar-logo {
      width: 30px; height: 30px;
      background: var(--gold); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #000; font-weight: 800;
    }
    .topbar-title { font-size: 17px; font-weight: 800; letter-spacing: 0.04em; }
    .topbar-title span { color: var(--gold); }

    /* ── Page content ── */
    #content {
      flex: 1;
      padding: 32px 20px calc(var(--nav-h) + 32px);
      overflow-x: hidden;
    }

    /* ── Header block ── */
    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 13px;
      color: var(--txt-2);
      line-height: 1.6;
      margin-bottom: 28px;
    }

    /* ── Trial pill ── */
    .trial-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: var(--gold-glow);
      border: 1px solid var(--gold-dim);
      color: var(--gold);
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      padding: 5px 13px;
      border-radius: 20px;
      margin-bottom: 24px;
      letter-spacing: 0.06em;
    }

    /* ── Step indicator ── */
    .step-row {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 28px;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-num {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--txt-3);
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .step-num.active {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .step-num.done {
      background: var(--green-dim);
      border-color: var(--green);
      color: var(--green);
    }

    .step-label {
      font-size: 12px;
      color: var(--txt-3);
      font-weight: 600;
      transition: color 0.2s;
    }

    .step-label.active { color: var(--txt-1); }

    .step-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 10px;
    }

    /* ── Form fields ── */
    .field-group {
      margin-bottom: 20px;
    }

    .field-label {
      display: block;
      font-size: 11px;
      color: var(--txt-2);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      margin-bottom: 8px;
      font-family: 'Space Mono', monospace;
    }

    .field-input {
      display: block;
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--txt-1);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .field-input:focus {
      border-color: var(--gold);
    }

    .field-input::placeholder {
      color: var(--txt-3);
    }

    /* ── Phone row ── */
    .phone-row {
      display: flex;
      gap: 10px;
    }

    /* Country code selector wrapper */
    .country-select-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .country-trigger {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 14px;
      cursor: pointer;
      transition: border-color 0.2s;
      white-space: nowrap;
      min-width: 110px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      color: var(--txt-1);
      user-select: none;
    }

    .country-trigger:hover,
    .country-trigger.open {
      border-color: var(--gold);
    }

    .country-trigger .flag {
      font-size: 18px;
      line-height: 1;
    }

    .country-trigger .code {
      flex: 1;
    }

    .country-trigger .arrow {
      font-size: 10px;
      color: var(--txt-3);
      transition: transform 0.2s;
    }

    .country-trigger.open .arrow {
      transform: rotate(180deg);
    }

    /* Dropdown */
    .country-dropdown {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      width: 300px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      z-index: 500;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      opacity: 0;
      transform: translateY(-6px) scale(0.97);
      pointer-events: none;
      transition: all 0.18s ease;
      overflow: hidden;
    }

    .country-dropdown.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: all;
    }

    .country-search-wrap {
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }

    .country-search {
      width: 100%;
      background: var(--bg-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--txt-1);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .country-search:focus { border-color: var(--gold); }
    .country-search::placeholder { color: var(--txt-3); }

    .country-list {
      max-height: 240px;
      overflow-y: auto;
      padding: 6px;
    }

    .country-list::-webkit-scrollbar { width: 4px; }
    .country-list::-webkit-scrollbar-track { background: transparent; }
    .country-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .country-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 13px;
      color: var(--txt-1);
    }

    .country-option:hover,
    .country-option.selected {
      background: var(--bg-muted);
    }

    .country-option.selected {
      color: var(--gold);
    }

    .country-option .opt-flag {
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .country-option .opt-name {
      flex: 1;
      font-size: 13px;
    }

    .country-option .opt-code {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--txt-2);
      flex-shrink: 0;
    }

    .phone-input-wrap {
      flex: 1;
    }

    /* ── OTP box ── */
    .otp-section {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    /* ── Error message ── */
    .err-msg {
      font-size: 13px;
      color: var(--red);
      margin-top: 10px;
      display: none;
      padding: 10px 14px;
      background: rgba(255,69,97,0.07);
      border-radius: 10px;
      border: 1px solid rgba(255,69,97,0.15);
      line-height: 1.5;
    }

    /* ── Buttons ── */
    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 15px 20px;
      margin-top: 24px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px 20px;
      margin-top: 10px;
      background: transparent;
      color: var(--txt-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover { border-color: var(--gold); color: var(--gold); }

    /* ── Switch text ── */
    .form-switch {
      text-align: center;
      font-size: 13px;
      color: var(--txt-2);
      margin-top: 24px;
      line-height: 1.6;
    }

    .form-switch a {
      color: var(--gold);
      font-weight: 700;
      text-decoration: none;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ── */
    .section-divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar">
    <div class="topbar-brand">
      <div class="topbar-logo">XAU</div>
      <span class="topbar-title">XAU<span>/USD</span></span>
    </div>
  </div>

  <!-- Main content -->
  <div id="content">

    <h1 class="page-title">Create Account</h1>
    <p class="page-sub">Sign up to access gold price predictions and market signals.</p>

    <div class="trial-badge">3 Days Free · No Card Required</div>

    <!-- Step indicator -->
    <div class="step-row">
      <div class="step-item">
        <div class="step-num active" id="dot-1">1</div>
        <span class="step-label active" id="label-1">Your Details</span>
      </div>
      <div class="step-line"></div>
      <div class="step-item">
        <div class="step-num" id="dot-2">2</div>
        <span class="step-label" id="label-2">Phone Verify</span>
      </div>
    </div>

    <!-- ══ STEP 1 ══ -->
    <div id="signup-step1">

      <div class="field-group">
        <label class="field-label" for="su-email">Email Address</label>
        <input class="field-input" type="email" id="su-email"
               placeholder="you@email.com" autocomplete="email" />
      </div>

      <div class="field-group">
        <label class="field-label" for="su-pass">Password</label>
        <input class="field-input" type="password" id="su-pass"
               placeholder="Minimum 6 characters" autocomplete="new-password" />
      </div>

      <div class="field-group">
        <label class="field-label" for="su-pass2">Confirm Password</label>
        <input class="field-input" type="password" id="su-pass2"
               placeholder="Repeat password" autocomplete="new-password" />
      </div>

      <div class="err-msg" id="su-err"></div>

      <button class="btn-primary" id="su-next-btn" onclick="goToPhoneStep()">
        Continue
      </button>

      <div class="form-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>

    <!-- ══ STEP 2 ══ -->
    <div id="signup-step2" style="display:none;">

      <div class="field-group">
        <label class="field-label">Phone Number</label>
        <div class="phone-row">

          <!-- Country code selector -->
          <div class="country-select-wrap">
            <div class="country-trigger" id="country-trigger" onclick="toggleCountryDropdown()">
              <span class="flag" id="selected-flag">🇳🇬</span>
              <span class="code" id="selected-code">+234</span>
              <span class="arrow">▼</span>
            </div>
            <div class="country-dropdown" id="country-dropdown">
              <div class="country-search-wrap">
                <input class="country-search" type="text" id="country-search"
                       placeholder="Search country..." oninput="filterCountries(this.value)" />
              </div>
              <div class="country-list" id="country-list"></div>
            </div>
          </div>

          <!-- Phone number input -->
          <div class="phone-input-wrap">
            <input class="field-input" type="tel" id="su-phone"
                   placeholder="8012345678" autocomplete="tel"
                   style="border-radius:12px;" />
          </div>

        </div>
      </div>

      <div class="err-msg" id="phone-err"></div>

      <div id="recaptcha-container" style="margin-top:4px;"></div>

      <button class="btn-primary" id="send-otp-btn" onclick="sendOTP()">
        Send Verification Code
      </button>

      <!-- OTP section -->
      <div class="otp-section" id="otp-section">

        <div class="field-group" style="margin-bottom:0;">
          <label class="field-label" for="su-otp">Verification Code</label>
          <input class="field-input" type="number" id="su-otp"
                 placeholder="Enter the 6-digit code" />
        </div>

        <div class="err-msg" id="otp-err"></div>

        <button class="btn-primary" id="su-btn" onclick="doSignUp()">
          Create Account
        </button>

        <button class="btn-secondary" onclick="sendOTP()">
          Resend Code
        </button>

      </div>

      <div class="section-divider"></div>

      <button class="btn-secondary" onclick="backToStep1()">
        Back to Step 1
      </button>

      <div class="form-switch">
        Already have an account? <a href="login.html">Sign in</a>
      </div>

    </div>

  </div><!-- /content -->

  <!-- Bottom nav -->
  <nav id="bottomnav">
    <a class="nav-btn" data-page="index.html"   href="index.html"><i class="fa-solid fa-house"></i>Home</a>
    <a class="nav-btn" data-page="news.html"    href="news.html"><i class="fa-solid fa-newspaper"></i>News</a>
    <a class="nav-btn" data-page="trends.html"  href="trends.html"><i class="fa-solid fa-chart-area"></i>Trends</a>
    <a class="nav-btn" data-page="predict.html" href="predict.html"><i class="fa-solid fa-brain"></i>Forecast</a>
  </nav>

</div>

let selectedCountry = COUNTRIES[0]; // Nigeria default
let filteredCountries = [...COUNTRIES];

/* ── Render country list ── */
function renderCountryList(list) {
  const el = document.getElementById('country-list');
  el.innerHTML = list.map((c, i) => `
    <div class="country-option ${c.name === selectedCountry.name ? 'selected' : ''}"
         onclick="selectCountry(${COUNTRIES.indexOf(c)})">
      <span class="opt-flag">${c.flag}</span>
      <span class="opt-name">${c.name}</span>
      <span class="opt-code">${c.code}</span>
    </div>`).join('');
}

function selectCountry(idx) {
  selectedCountry = COUNTRIES[idx];
  document.getElementById('selected-flag').textContent = selectedCountry.flag;
  document.getElementById('selected-code').textContent = selectedCountry.code;
  closeCountryDropdown();
}

function toggleCountryDropdown() {
  const trigger  = document.getElementById('country-trigger');
  const dropdown = document.getElementById('country-dropdown');
  const isOpen   = dropdown.classList.contains('open');
  if (isOpen) {
    closeCountryDropdown();
  } else {
    dropdown.classList.add('open');
    trigger.classList.add('open');
    renderCountryList(COUNTRIES);
    setTimeout(() => document.getElementById('country-search').focus(), 100);
  }
}

function closeCountryDropdown() {
  document.getElementById('country-dropdown').classList.remove('open');
  document.getElementById('country-trigger').classList.remove('open');
  document.getElementById('country-search').value = '';
}

function filterCountries(q) {
  const lower = q.toLowerCase();
  const results = COUNTRIES.filter(c =>
    c.name.toLowerCase().includes(lower) || c.code.includes(q)
  );
  renderCountryList(results);
}

/* Close dropdown on outside click */
document.addEventListener('click', function(e) {
  const wrap = document.querySelector('.country-select-wrap');
  if (wrap && !wrap.contains(e.target)) closeCountryDropdown();
});

/* Init render */
renderCountryList(COUNTRIES);
</script>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getAuth, createUserWithEmailAndPassword,
    onAuthStateChanged, PhoneAuthProvider, RecaptchaVerifier
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc,
           getDocs, collection, query, where, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCVUXlnWPqtVQnqxHNyABktkFxnRj3mFvs",
    authDomain: "xautracker.firebaseapp.com",
    projectId: "xautracker",
    storageBucket: "xautracker.firebasestorage.app",
    messagingSenderId: "831752609455",
    appId: "1:831752609455:web:ea9be478691744afa73e5a"
  };

  const app  = initializeApp(firebaseConfig, 'signup');
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let confirmationResult = null;
  let recaptchaVerifier  = null;

  /* ── Already logged in ── */
  onAuthStateChanged(auth, async user => {
    if (!user) return;
    try {
      const snap = await getDoc(doc(db, 'users', user.uid));
      if (!snap.exists()) { window.location.href = 'predict.html'; return; }
      const d   = snap.data();
      const now = Date.now();
      const hasAccess =
        (d.trialEndsAt && new Date(d.trialEndsAt).getTime() > now) ||
        (d.subscriptionStatus === 'active' && d.currentPeriodEnd &&
          new Date(d.currentPeriodEnd).getTime() > now) ||
        (d.manualAccess && (!d.manualAccessExpiresAt ||
          new Date(d.manualAccessExpiresAt).getTime() > now));
      window.location.href = hasAccess ? 'predict.html' : 'subscribe.html';
    } catch { window.location.href = 'predict.html'; }
  });

  /* ── Helpers ── */
  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent   = msg;
    el.style.display = msg ? 'block' : 'none';
  }

  function setLoading(btnId, loading, loadText, origText) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) {
      btn.innerHTML = `<span class="spinner"></span> ${loadText}`;
    } else {
      btn.textContent = origText;
    }
  }

  /* ── Step 1 ── */
  window.goToPhoneStep = () => {
    const email = document.getElementById('su-email').value.trim();
    const pass  = document.getElementById('su-pass').value;
    const pass2 = document.getElementById('su-pass2').value;
    showErr('su-err', '');

    if (!email)          { showErr('su-err', 'Please enter your email address.'); return; }
    if (pass.length < 6) { showErr('su-err', 'Password must be at least 6 characters.'); return; }
    if (pass !== pass2)  { showErr('su-err', 'Passwords do not match.'); return; }

    document.getElementById('signup-step1').style.display = 'none';
    document.getElementById('signup-step2').style.display = 'block';

    /* Update step indicators */
    document.getElementById('dot-1').className   = 'step-num done';
    document.getElementById('dot-1').textContent = '✓';
    document.getElementById('label-1').className = 'step-label';
    document.getElementById('dot-2').className   = 'step-num active';
    document.getElementById('label-2').className = 'step-label active';

    initRecaptcha();
  };

  window.backToStep1 = () => {
    document.getElementById('signup-step2').style.display = 'none';
    document.getElementById('signup-step1').style.display = 'block';

    document.getElementById('dot-1').className   = 'step-num active';
    document.getElementById('dot-1').textContent = '1';
    document.getElementById('label-1').className = 'step-label active';
    document.getElementById('dot-2').className   = 'step-num';
    document.getElementById('label-2').className = 'step-label';

    if (recaptchaVerifier) {
      recaptchaVerifier.clear();
      recaptchaVerifier = null;
    }
    document.getElementById('recaptcha-container').innerHTML = '';
    document.getElementById('otp-section').style.display = 'none';
    showErr('phone-err', '');
    showErr('otp-err', '');
  };

  /* ── reCAPTCHA ── */
  function initRecaptcha() {
    if (recaptchaVerifier) return;
    recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'normal',
      'expired-callback': () => showErr('phone-err', 'reCAPTCHA expired. Please try again.')
    });
    recaptchaVerifier.render();
  }

  /* ── Build full phone number ── */
  function getFullPhone() {
    const local = document.getElementById('su-phone').value.trim();
    // Strip leading zero if present
    const stripped = local.startsWith('0') ? local.slice(1) : local;
    return window.selectedCountry.code + stripped;
  }

  /* ── Send OTP ── */
  window.sendOTP = async () => {
    const fullPhone = getFullPhone();
    showErr('phone-err', '');

    if (!document.getElementById('su-phone').value.trim()) {
      showErr('phone-err', 'Please enter your phone number.');
      return;
    }

    const btn = document.getElementById('send-otp-btn');
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner"></span> Sending...`;

    try {
      /* Check if phone already used */
      const phoneQuery = query(collection(db, 'users'), where('phone', '==', fullPhone));
      const existing   = await getDocs(phoneQuery);

      if (!existing.empty) {
        const ud = existing.docs[0].data();
        if (ud.trialEndsAt || ud.subscriptionStatus) {
          showErr('phone-err', 'This phone number has already been used for a free trial. Please sign in or subscribe.');
          btn.disabled = false;
          btn.textContent = 'Send Verification Code';
          return;
        }
      }

      const { signInWithPhoneNumber } = await import(
        "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"
      );
      confirmationResult = await signInWithPhoneNumber(auth, fullPhone, recaptchaVerifier);

      document.getElementById('otp-section').style.display = 'block';
      btn.textContent = 'Code Sent';

    } catch (e) {
      console.error('OTP error:', e);
      const msg =
        e.code === 'auth/invalid-phone-number' ? 'Invalid phone number. Check the format and try again.' :
        e.code === 'auth/too-many-requests'    ? 'Too many attempts. Please try again later.' :
        e.code === 'auth/quota-exceeded'       ? 'SMS quota exceeded. Try again later.' :
        'Failed to send code: ' + e.message;
      showErr('phone-err', msg);
      btn.disabled = false;
      btn.textContent = 'Send Verification Code';

      if (recaptchaVerifier) {
        recaptchaVerifier.clear();
        recaptchaVerifier = null;
        document.getElementById('recaptcha-container').innerHTML = '';
        initRecaptcha();
      }
    }
  };

  /* ── Create account ── */
  window.doSignUp = async () => {
    const otp      = document.getElementById('su-otp').value.trim();
    const email    = document.getElementById('su-email').value.trim();
    const pass     = document.getElementById('su-pass').value;
    const fullPhone = getFullPhone();
    showErr('otp-err', '');

    if (!otp || otp.length !== 6) {
      showErr('otp-err', 'Enter the 6-digit code sent to your phone.');
      return;
    }
    if (!confirmationResult) {
      showErr('otp-err', 'Please request a verification code first.');
      return;
    }

    setLoading('su-btn', true, 'Creating account...', 'Create Account');

    try {
      PhoneAuthProvider.credential(confirmationResult.verificationId, otp);

      const { user } = await createUserWithEmailAndPassword(auth, email, pass);

      const trialEndsAt = new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString();

      await setDoc(doc(db, 'users', user.uid), {
        email,
        phone:                 fullPhone,
        createdAt:             serverTimestamp(),
        trialEndsAt,
        subscriptionStatus:    'trial',
        flutterwaveTxRef:      null,
        flutterwaveTxId:       null,
        currentPeriodEnd:      null,
        manualAccess:          false,
        manualAccessNote:      '',
        manualAccessExpiresAt: null,
        lastPaymentAt:         null,
        lastPaymentAmount:     null,
      });

      window.location.href = 'predict.html';

    } catch (e) {
      console.error('Signup error:', e);
      const msg =
        e.code === 'auth/invalid-verification-code' ? 'Incorrect code. Please try again.' :
        e.code === 'auth/code-expired'              ? 'Code expired. Request a new one.' :
        e.code === 'auth/email-already-in-use'      ? 'An account with this email already exists.' :
        e.code === 'auth/invalid-email'             ? 'Please enter a valid email address.' :
        'Sign up failed: ' + e.message;
      showErr('otp-err', msg);
      setLoading('su-btn', false, '', 'Create Account');
    }
  };

  /* Enter key support */
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const s1 = document.getElementById('signup-step1');
    const s2 = document.getElementById('signup-step2');
    if (s1.style.display !== 'none') window.goToPhoneStep();
    else if (document.getElementById('otp-section').style.display !== 'none') window.doSignUp();
  });
</script>
