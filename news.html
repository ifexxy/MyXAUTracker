/* ── Helpers ────────────────────────────── */
function timeAgo(dateStr) {
  const m = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (m < 1)    return 'just now';
  if (m < 60)   return m + 'm ago';
  if (m < 1440) return Math.floor(m / 60) + 'h ago';
  return Math.floor(m / 1440) + 'd ago';
}

function safeLink(url) {
  /* Make sure we never open a broken or empty link */
  try {
    const u = new URL(url);
    return u.href;
  } catch {
    return 'https://gnews.io/s?q=gold+XAU';
  }
}

function buildCard(title, desc, time, source, link) {
  const safeTitle = title.replace(/"/g, '&quot;');
  return `
    <div class="news-card" onclick="window.open('${safeLink(link)}','_blank')">
      <div class="news-meta">
        <span class="news-source">
          <i class="fa-solid fa-rss" style="margin-right:4px;font-size:8px;"></i>
          ${source}
        </span>
        <span class="news-time">${timeAgo(time)}</span>
      </div>
      <div class="news-title">${safeTitle}</div>
      <div class="news-desc">${desc}</div>
      <div class="news-link">
        <i class="fa-solid fa-arrow-up-right-from-square" style="font-size:10px;"></i>
        Read full article
      </div>
    </div>`;
}

function showError(msg) {

    <div class="news-card" style="text-align:center;padding:30px 16px;">

           style="color:var(--gold);font-size:12px;">

        </a>
      </div>
    </div>`;
}

/* ── Strategy 1: GNews API ──────────────── */
async function fetchFromGNews() {
  const articles = await fetchGNewsArticles(); // calls /api/news — no key exposed
  if (!articles?.length) throw new Error('No articles');
  return articles.map(a => ({
    title:   a.title || 'Gold Market Update',
    desc:    (a.description || '').slice(0, 160),
    time:    a.publishedAt,
    source:  a.source?.name || 'GNews',
    link:    a.url,
  }));
}

/* ── Strategy 2: Investing.com RSS proxy ── */
async function fetchFromInvesting() {
  const RSS    = 'https://www.investing.com/rss/news_25.rss'; /* commodities feed */
  const PROXY  = `https://api.allorigins.win/get?url=${encodeURIComponent(RSS)}&timestamp=${Date.now()}`;
  const res    = await fetch(PROXY, { cache: 'no-store' });
  if (!res.ok) throw new Error('Investing proxy HTTP ' + res.status);
  const json   = await res.json();
  const parser = new DOMParser();
  const xml    = parser.parseFromString(json.contents, 'text/xml');
  if (xml.querySelector('parsererror')) throw new Error('Investing XML parse failed');
  const items  = [...xml.querySelectorAll('item')];
  if (!items.length) throw new Error('Investing: no items');

  return items.slice(0, 15).map(el => {
    /* description often has HTML — strip it */
    const rawDesc = el.querySelector('description')?.textContent || '';
    const tmp = document.createElement('div');
    tmp.innerHTML = rawDesc;
    const cleanDesc = (tmp.textContent || '').trim().slice(0, 160) || 'Tap to read the full article.';

    /* link node in Investing RSS is a text node between tags */
    let link = '';
    el.childNodes.forEach(n => { if (n.nodeName === 'link') link = n.textContent?.trim(); });
    if (!link) link = el.querySelector('link')?.textContent?.trim() || '';

    return {
      title:  (el.querySelector('title')?.textContent || 'Gold Market Update').trim(),
      desc:   cleanDesc,
      time:   el.querySelector('pubDate')?.textContent || new Date().toUTCString(),
      source: 'Investing.com',
      link,
    };
  });
}

/* ── Strategy 3: BullionVault RSS proxy ── */
async function fetchFromBullionVault() {
  const RSS   = 'https://www.bullionvault.com/gold-news/rss';
  const PROXY = `https://corsproxy.io/?${encodeURIComponent(RSS)}`;
  const res   = await fetch(PROXY, { cache: 'no-store' });
  if (!res.ok) throw new Error('BullionVault proxy HTTP ' + res.status);
  const text  = await res.text();
  const parser = new DOMParser();
  const xml   = parser.parseFromString(text, 'text/xml');
  if (xml.querySelector('parsererror')) throw new Error('BullionVault XML parse failed');
  const items = [...xml.querySelectorAll('item')];
  if (!items.length) throw new Error('BullionVault: no items');

  return items.slice(0, 15).map(el => {
    const rawDesc = el.querySelector('description')?.textContent || '';
    const tmp = document.createElement('div');
    tmp.innerHTML = rawDesc;
    const cleanDesc = (tmp.textContent || '').trim().slice(0, 160) || 'Tap to read the full article.';
    let link = el.querySelector('link')?.textContent?.trim() || '';
    el.childNodes.forEach(n => { if (n.nodeName === 'link') link = n.textContent?.trim() || link; });
    return {
      title:  (el.querySelector('title')?.textContent || 'Gold Market Update').trim(),
      desc:   cleanDesc,
      time:   el.querySelector('pubDate')?.textContent || new Date().toUTCString(),
      source: 'BullionVault',
      link,
    };
  });
}

  document.getElementById('news-container').innerHTML =

}

};
const fbApp = initializeApp(firebaseConfig, 'news-app');
const db    = getFirestore(fbApp);

async function loadBlogPosts() {
  try {
    const q    = query(
      collection(db, 'posts'),
      where('published', '==', true),
      orderBy('createdAt', 'desc')
    );
    const snap = await getDocs(q);
    if (snap.empty) return;

    const posts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderBlogPosts(posts);
    document.getElementById('blog-section').style.display = 'block';
  } catch (e) {
    console.warn('Blog posts failed to load:', e.message);
    /* Silently skip — live news still shows */
  }
}

function renderBlogPosts(posts) {
  document.getElementById('blog-container').innerHTML = posts.map(p => {

    const postUrl  = `post.html?id=${p.id}`;
    const date     = p.createdAt?.toDate?.()?.toLocaleDateString('en-US', {
      day: 'numeric', month: 'short', year: 'numeric'
    }) || '';
    const preview  = p.body.slice(0, 160) + (p.body.length > 160 ? '...' : '');

    const imgHtml  = p.imageUrl ? `
      <img src="${p.imageUrl}" alt="${p.title}"
           style="width:100%;height:180px;object-fit:cover;
                  border-radius:10px 10px 0 0;display:block;"
           onerror="this.style.display='none'" />` : '';

    return `
      <div class="news-card" style="padding:0;overflow:hidden;margin-bottom:14px;"
           onclick="location.href='${postUrl}'">

        ${imgHtml}

        <div style="padding:14px 16px;">
          <div class="news-meta">
            <span class="news-source">
              <i class="fa-solid fa-pen-nib" style="margin-right:4px;font-size:8px;"></i>
              ${p.category || 'Update'}
            </span>
            <span class="news-time">${date}</span>
            ${p.readTime
              ? `<span style="font-size:10px;color:var(--txt-3);">
                   <i class="fa-regular fa-clock" style="margin-right:3px;"></i>${p.readTime}
                 </span>`
              : ''}
          </div>

          <div class="news-title" style="font-size:15px;">${p.title}</div>
          <div class="news-desc" style="margin-top:6px;">${preview}</div>

          ${p.tags?.length ? `
            <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;">
              ${p.tags.map(t =>
                `<span style="font-size:10px;padding:2px 8px;background:var(--gold-glow);
                              color:var(--gold);border-radius:8px;">#${t}</span>`
              ).join('')}
            </div>` : ''}

          <div class="news-link" style="margin-top:10px;">
            <i class="fa-solid fa-arrow-right" style="font-size:10px;"></i>
            Read full post
          </div>
        </div>
      </div>`;
  }).join('');
}

/* ── Orchestrator: tries all 3 in order ── */
async function fetchNews() {
  const strategies = [
    { name: 'GNews',        fn: fetchFromGNews },
    { name: 'Investing.com',fn: fetchFromInvesting },
    { name: 'BullionVault', fn: fetchFromBullionVault },
  ];

  for (const s of strategies) {
    try {
      console.log('Trying news source:', s.name);
      const articles = await s.fn();
      renderNews(articles);
      console.log('News loaded from:', s.name);
      return; /* stop as soon as one works */
    } catch (err) {
      console.warn(s.name + ' failed:', err.message);
    }
  }

  /* All three failed */
  showError('Could not load news from any source.');
}
